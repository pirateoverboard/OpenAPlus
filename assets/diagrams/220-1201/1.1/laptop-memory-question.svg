<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440" role="img" aria-labelledby="title description">
  <title id="title">Memory module comparison question</title>
  <desc id="description">Two original memory module drawings labeled A and B without their form-factor names.</desc>
  <rect width="800" height="440" fill="#f5f7fa"/>
  <text x="400" y="42" fill="#263238" font-family="sans-serif" font-size="26" font-weight="700" text-anchor="middle">Which module is the SO-DIMM?</text>
  <g transform="translate(70 90)">
    <rect width="660" height="105" rx="9" fill="#287a4d" stroke="#17492e" stroke-width="5"/>
    <g fill="#263238">
      <rect x="50" y="22" width="74" height="48" rx="4"/>
      <rect x="146" y="22" width="74" height="48" rx="4"/>
      <rect x="242" y="22" width="74" height="48" rx="4"/>
      <rect x="344" y="22" width="74" height="48" rx="4"/>
      <rect x="440" y="22" width="74" height="48" rx="4"/>
      <rect x="536" y="22" width="74" height="48" rx="4"/>
    </g>
    <path d="M319 105v-24h22v24" fill="#f5f7fa"/>
    <path d="M25 105h610" stroke="#d6a629" stroke-width="14" stroke-dasharray="13 8"/>
  </g>
  <circle cx="42" cy="142" r="25" fill="#176b87"/>
  <text x="42" y="151" fill="#fff" font-family="sans-serif" font-size="26" font-weight="700" text-anchor="middle">A</text>
  <g transform="translate(210 258)">
    <rect width="380" height="92" rx="9" fill="#287a4d" stroke="#17492e" stroke-width="5"/>
    <g fill="#263238">
      <rect x="38" y="19" width="62" height="42" rx="4"/>
      <rect x="118" y="19" width="62" height="42" rx="4"/>
      <rect x="200" y="19" width="62" height="42" rx="4"/>
      <rect x="280" y="19" width="62" height="42" rx="4"/>
    </g>
    <path d="M179 92v-22h22v22" fill="#f5f7fa"/>
    <path d="M20 92h340" stroke="#d6a629" stroke-width="13" stroke-dasharray="12 7"/>
  </g>
  <circle cx="178" cy="304" r="25" fill="#176b87"/>
  <text x="178" y="313" fill="#fff" font-family="sans-serif" font-size="26" font-weight="700" text-anchor="middle">B</text>
  <rect x="245" y="374" width="310" height="42" rx="8" fill="#6b7280"/>
  <text x="400" y="402" fill="#fff" font-family="sans-serif" font-size="20" text-anchor="middle">FORM-FACTOR NAMES HIDDEN</text>
</svg>
