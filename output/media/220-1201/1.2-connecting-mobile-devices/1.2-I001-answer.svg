<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Mobile connector identification answer</title>
  <desc id="desc">Original OpenAPlus diagram revealing that connector B is USB-C.</desc>
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Connector B is USB-C</text>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">USB-C is symmetric and reversible.</text>

  <g transform="translate(105 132)" opacity="0.62">
    <rect x="0" y="0" width="190" height="170" rx="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
    <text x="95" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">A</text>
    <path d="M63 77 L127 77 L139 113 L51 113 Z" fill="#334155"/>
    <path d="M76 87 L114 87 L121 104 L69 104 Z" fill="#cbd5e1"/>
    <line x1="95" y1="113" x2="95" y2="140" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
    <text x="95" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Micro-USB style</text>
  </g>

  <g transform="translate(355 132)">
    <rect x="-8" y="-8" width="206" height="186" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/>
    <text x="95" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#14532d">B</text>
    <path d="M55 91 C55 76 67 64 82 64 H108 C123 64 135 76 135 91 C135 106 123 118 108 118 H82 C67 118 55 106 55 91 Z" fill="#166534"/>
    <path d="M75 82 H115 C120 82 124 86 124 91 C124 96 120 100 115 100 H75 C70 100 66 96 66 91 C66 86 70 82 75 82 Z" fill="#bbf7d0"/>
    <line x1="95" y1="118" x2="95" y2="140" stroke="#166534" stroke-width="12" stroke-linecap="round"/>
    <text x="95" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">USB-C</text>
  </g>

  <g transform="translate(605 132)" opacity="0.62">
    <rect x="0" y="0" width="190" height="170" rx="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
    <text x="95" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">C</text>
    <rect x="57" y="70" width="76" height="46" rx="15" fill="#334155"/>
    <rect x="78" y="82" width="34" height="22" rx="5" fill="#cbd5e1"/>
    <line x1="95" y1="116" x2="95" y2="140" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
    <text x="95" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Lightning style</text>
  </g>

  <rect x="228" y="330" width="444" height="46" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#14532d">Answer: B — the reversible, symmetric USB-C connector.</text>
</svg>
