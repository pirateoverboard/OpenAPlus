  <rect x="174" y="82" width="452" height="260" rx="8" fill="#dceaf2"/>
  <circle cx="400" cy="68" r="5" fill="#8fa6b5"/>
  <rect x="125" y="375" width="550" height="44" rx="8" fill="#9cacb7"/>
