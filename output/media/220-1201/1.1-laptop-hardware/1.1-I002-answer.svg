  <g font-family="sans-serif" font-size="22" font-weight="700" text-anchor="middle">
    <circle cx="620" cy="145" r="20" fill="#176b87"/><text x="620" y="153" fill="#fff">A</text>
    <circle cx="592" cy="398" r="20" fill="#aeb8be"/><text x="592" y="406" fill="#fff">B</text>
